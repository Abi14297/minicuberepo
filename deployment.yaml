apiVersion: apps/v1
kind: Deployment
metadata:
  name: devtest-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devtest
  template:
    metadata:
      labels:
        app: devtest
    spec:
      containers:
      - name: devtest
        image: abi14297/prodtask:4
        ports:
        - containerPort: 80
